<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Kit Inspection Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        body { background-color: #f8f9fa; padding: 30px 15px; }
        .form-container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .tool-item {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .tool-details { display: none; margin-top: 10px; }
        .tool-details.show { display: block; }
    </style>
</head>

<body>
<div class="form-container">

    <h1 class="text-center mb-4">🔧 Tool Kit Inspection</h1>

    <form id="inspectionForm">

        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Technician Name *</label>
                <input type="text" class="form-control" id="techName">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Inspection Date</label>
                <input type="date" class="form-control" id="inspectionDate" readonly>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Kit Type *</label>
            <select class="form-select" id="kitType">
                <option value="">-- Select Kit --</option>
                <option value="A Nacelle">Kit A Nacelle</option>
                <option value="A Tower">Kit A Tower</option>
                <option value="B Nacelle">Kit B Nacelle</option>
                <option value="B Tower">Kit B Tower</option>
            </select>
        </div>

        <h5>Tools Checklist</h5>
        <div id="toolsContainer"></div>

        <div class="mb-4">
            <label class="form-label fw-bold">Notes</label>
            <textarea class="form-control" id="notes"></textarea>
        </div>

        <button class="btn btn-primary w-100">Submit & Email</button>

    </form>
</div>

<script>
document.getElementById('inspectionDate').value =
    new Date().toISOString().split('T')[0];

const toolLists = {
    "A Nacelle": [
        { code: "A9B10409967", name: "ITH PUMP 400V" },
        { code: "A9B10417874", name: "HYDRAULIC HOSE 20M" },
        { code: "A9BB0025812", name: "M42 Bottom" }
    ],
    "A Tower": [
        { code: "M48Bottom", name: "M48 Bottom" },
        { code: "M56Top", name: "M56 Top" }
    ],
    "B Nacelle": [],
    "B Tower": []
};

toolLists["B Nacelle"] = toolLists["A Nacelle"];
toolLists["B Tower"] = toolLists["A Tower"];

const kitSelect = document.getElementById('kitType');
const container = document.getElementById('toolsContainer');

kitSelect.addEventListener('change', () => {
    container.innerHTML = '';
    const list = toolLists[kitSelect.value];
    if (!list) return;

    list.forEach(tool => {
        const isTension = tool.name.includes("M");

        const div = document.createElement('div');
        div.className = 'tool-item';

        div.innerHTML = `
            <div class="form-check">
                <input type="checkbox" class="form-check-input tool-check" 
                    value="${tool.code}" data-name="${tool.name}">
                <label class="form-check-label">
                    ${tool.code} – ${tool.name}
                </label>
            </div>

            <div class="tool-details">
                <input class="form-control serial-input mt-2" placeholder="Serial (EBCJV...)">
                ${isTension ? `<input class="form-control cycles-input mt-2" placeholder="Cycles">` : ''}
            </div>
        `;

        container.appendChild(div);

        const check = div.querySelector('.tool-check');
        const details = div.querySelector('.tool-details');

        check.addEventListener('change', () => {
            details.classList.toggle('show', check.checked);
        });
    });
});

// EmailJS init
emailjs.init("XO8aikuA7tN7m9laW");

document.getElementById('inspectionForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const tech = document.getElementById('techName').value.trim();
    const kit = kitSelect.value;
    const date = document.getElementById('inspectionDate').value;
    const notes = document.getElementById('notes').value || "None";

    if (!tech || !kit) {
        alert("Fill required fields");
        return;
    }

    const tools = [];

    document.querySelectorAll('.tool-check:checked').forEach(check => {
        const row = check.closest('.tool-item');

        const serial = row.querySelector('.serial-input').value;
        const cyclesEl = row.querySelector('.cycles-input');

        const cycles = cyclesEl ? cyclesEl.value : '';

        if (serial) {
            tools.push({
                code: check.value,
                name: check.dataset.name,
                serial,
                cycles
            });
        }
    });

    if (tools.length === 0) {
        alert("Select at least one tool");
        return;
    }

    // 🔥 FIX: build string manually
    const tools_list = tools.map(t =>
        `${t.code} – ${t.name}
Serial: ${t.serial}${t.cycles ? " | Cycles: " + t.cycles : ""}`
    ).join("\n\n");

    const params = {
        technician: tech,
        date: date,
        kit: kit,
        notes: notes,
        timestamp: new Date().toLocaleString(),
        tools_list: tools_list
    };

    emailjs.send("service_hcolg8r", "template_gjz0o6c", params)
        .then(() => alert("✅ Email sent successfully"))
        .catch(err => {
            console.error(err);
            alert("❌ Failed to send email");
        });
});
</script>

</body>
</html>
